<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión 2: Radar HD | TK-OCEAN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #000, #001a33, #003d66);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        .header {
            text-align: center;
            padding: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            color: #00d4ff;
            text-shadow: 0 0 20px #00d4ff;
            margin-bottom: 10px;
        }
        
        .progress-bar {
            width: 80%;
            max-width: 600px;
            height: 30px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            margin: 20px auto;
            overflow: hidden;
            border: 2px solid #00d4ff;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            width: 0%;
            transition: width 0.5s ease;
        }
        .progress-text {
            text-align: center;
            margin-top: 10px;
            font-size: 1.2rem;
        }
        
        /* RADAR CONTAINER */
        .radar-container {
            position: relative;
            width: 500px;
            height: 500px;
            margin: 40px auto;
            background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
            border: 3px solid rgba(0, 212, 255, 0.3);
        }
        
        /* BARRIDO DEL RADAR */
        .radar-sweep {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d4ff, transparent);
            transform-origin: left center;
            animation: sweep 3s linear infinite;
        }
        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* PUNTOS DE FRECUENCIA */
        .freq-point {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 0, 100, 0.8);
            border: 3px solid #ff0066;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: blink 1s infinite;
            transition: all 0.3s;
            box-shadow: 0 0 30px #ff0066;
        }
        .freq-point:hover {
            transform: scale(1.2);
            box-shadow: 0 0 50px #ff0066;
        }
        .freq-point.detected {
            background: #00ff88;
            border-color: #00ff88;
            box-shadow: 0 0 30px #00ff88;
            animation: none;
        }
        .freq-point i {
            font-size: 1.5rem;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .point-1 { top: 20%; left: 30%; }
        .point-2 { top: 60%; right: 25%; }
        .point-3 { bottom: 25%; left: 40%; }
        
        /* CÍRCULOS CONCÉNTRICOS */
        .radar-ring {
            position: absolute;
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .ring-1 { width: 25%; height: 25%; }
        .ring-2 { width: 50%; height: 50%; }
        .ring-3 { width: 75%; height: 75%; }
        
        /* LÍNEAS DE GRID */
        .grid-line {
            position: absolute;
            background: rgba(0, 212, 255, 0.1);
        }
        .grid-h { width: 100%; height: 1px; top: 50%; }
        .grid-v { height: 100%; width: 1px; left: 50%; }
        
        /* ADS LATERALES 160x600 */
        .ad-left, .ad-right {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 160px;
            height: 600px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        .ad-left { left: 10px; }
        .ad-right { right: 10px; }
        
        /* CONTADOR */
        .detection-counter {
            text-align: center;
            margin-top: 30px;
            font-size: 1.5rem;
        }
        .detection-counter span {
            color: #00d4ff;
            font-size: 2rem;
            font-weight: 700;
        }
        
        /* BOTÓN VOLVER */
        .back-btn {
            display: block;
            margin: 30px auto;
            padding: 15px 40px;
            background: transparent;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: #00d4ff;
            color: #000;
        }
        
        /* MODAL ÉXITO */
        .success-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }
        .success-modal.active {
            display: flex;
        }
        .success-modal i {
            font-size: 5rem;
            color: #00ff88;
            margin-bottom: 20px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .success-modal h2 {
            font-size: 2.5rem;
            color: #00ff88;
            margin-bottom: 20px;
        }
        
        @media (max-width: 900px) {
            .ad-left, .ad-right { display: none; }
            .radar-container { width: 350px; height: 350px; }
        }
    </style>
</head>
<body>
    <!-- POPUNDER -->
    <script src="https://chewsever.com/a5/85/ae/a585ae93afa1a1f4fb015a12a3854d44.js"></script>
    
    <!-- SOCIAL BAR -->
    <script src="https://pl29162395.profitablecpmratenetwork.com/b0/f0/a4/b0f0a465b1c66ee1c469e876f6871721.js"></script>
    
    <!-- ADS LATERALES 160x600 -->
    <div class="ad-left">
        <script>
            atOptions = {
                'key' : '432b2300c3f18b7130ed0356f1af22e9',
                'format' : 'iframe',
                'height' : 600,
                'width' : 160,
                'params' : {}
            };
        </script>
        <script src="https://chewsever.com/432b2300c3f18b7130ed0356f1af22e9/invoke.js"></script>
    </div>
    
    <div class="ad-right">
        <script>
            atOptions = {
                'key' : '432b2300c3f18b7130ed0356f1af22e9',
                'format' : 'iframe',
                'height' : 600,
                'width' : 160,
                'params' : {}
            };
        </script>
        <script src="https://chewsever.com/432b2300c3f18b7130ed0356f1af22e9/invoke.js"></script>
    </div>
    
    <div class="header">
        <h1><i class="fas fa-satellite-dish"></i> Radar HD</h1>
        <p>Detecta las 3 frecuencias del servidor para sincronizar el acceso</p>
    </div>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progressBar"></div>
    </div>
    <p class="progress-text">Frecuencias detectadas: <span id="detectionCount">0</span> / 3</p>
    
    <div class="radar-container">
        <div class="radar-ring ring-1"></div>
        <div class="radar-ring ring-2"></div>
        <div class="radar-ring ring-3"></div>
        <div class="grid-line grid-h"></div>
        <div class="grid-line grid-v"></div>
        
        <div class="radar-sweep"></div>
        
        <!-- PUNTOS DE FRECUENCIA -->
        <div class="freq-point point-1" id="point1" onclick="detectPoint(1)">
            <i class="fas fa-broadcast-tower"></i>
        </div>
        <div class="freq-point point-2" id="point2" onclick="detectPoint(2)">
            <i class="fas fa-broadcast-tower"></i>
        </div>
        <div class="freq-point point-3" id="point3" onclick="detectPoint(3)">
            <i class="fas fa-broadcast-tower"></i>
        </div>
    </div>
    
    <button class="back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left"></i> Volver al Portal
    </button>
    
    <!-- MODAL ÉXITO -->
    <div class="success-modal" id="successModal">
        <i class="fas fa-check-circle"></i>
        <h2>¡SINCRONIZACIÓN COMPLETA!</h2>
        <p style="margin-bottom: 30px; font-size: 1.2rem;">Las 3 frecuencias han sido detectadas correctamente.</p>
        <button class="back-btn" onclick="completeMission()" style="background: linear-gradient(135deg, #00ff88, #00d4ff); border: none; color: #000; font-weight: 700;">
            <i class="fas fa-ticket-alt"></i> RECLAMAR TOKEN
        </button>
    </div>
    
    <script>
        let detectedCount = 0;
        const detectedPoints = new Set();
        const SMARTLINK_URL = 'https://www.profitablecpmratenetwork.com/fd92nnjkv?key=6932873a546891664b4dce617e72621d';
        
        function detectPoint(num) {
            if (detectedPoints.has(num)) return;
            
            // Marcar como detectado
            detectedPoints.add(num);
            document.getElementById(`point${num}`).classList.add('detected');
            document.getElementById(`point${num}`).innerHTML = '<i class="fas fa-check"></i>';
            
            // Abrir smartlink en background
            window.open(SMARTLINK_URL, '_blank');
            
            // Actualizar contador
            detectedCount++;
            document.getElementById('detectionCount').textContent = detectedCount;
            document.getElementById('progressBar').style.width = `${(detectedCount / 3) * 100}%`;
            
            // Mostrar efecto
            showDetectionEffect(num);
            
            // Verificar si completó
            if (detectedCount === 3) {
                setTimeout(() => {
                    document.getElementById('successModal').classList.add('active');
                }, 1000);
            }
        }
        
        function showDetectionEffect(num) {
            const point = document.getElementById(`point${num}`);
            point.style.transform = 'scale(1.5)';
            setTimeout(() => {
                point.style.transform = 'scale(1)';
            }, 300);
        }
        
        function completeMission() {
            console.log('[RADAR] Completando misión 2...');
            
            // Abrir otro smartlink
            window.open(SMARTLINK_URL, '_blank');
            
            // Guardar datos de misión completada
            const missionData = {
                number: 2,
                completed: true,
                completedAt: Date.now()
            };
            localStorage.setItem('tk-current-mission', JSON.stringify(missionData));
            localStorage.setItem('tk-mission-complete', 'true');
            
            console.log('[RADAR] Misión guardada:', missionData);
            
            // Redirigir al portal
            window.location.href = '../index.html?mission=completed';
        }
        
        function goBack() {
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
