<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión 5: Cofres Cine | TK-OCEAN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a0a2e, #2d1b4e, #1a0a2e);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #9d4edd, #c77dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        
        /* STATS */
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: rgba(157, 78, 221, 0.2);
            border: 2px solid #9d4edd;
            border-radius: 15px;
            padding: 15px 30px;
            text-align: center;
        }
        .stat-box span {
            display: block;
            font-size: 2rem;
            font-weight: 700;
            color: #c77dff;
        }
        .stat-box label {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        /* COFRE AREA */
        .chests-container {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 50px 0;
            flex-wrap: wrap;
        }
        
        .chest {
            width: 180px;
            height: 180px;
            background: linear-gradient(145deg, #4a2c6a, #2d1b4e);
            border: 4px solid #9d4edd;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .chest:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(157, 78, 221, 0.4);
        }
        .chest.opened {
            background: linear-gradient(145deg, #2d2d2d, #1a1a1a);
            border-color: #444;
            cursor: not-allowed;
            transform: none;
        }
        .chest.winner {
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            border-color: #ffd700;
            animation: winnerPulse 1s infinite;
        }
        @keyframes winnerPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 60px rgba(255, 215, 0, 0.8); }
        }
        .chest i {
            font-size: 5rem;
            color: #c77dff;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        .chest.winner i {
            color: #000;
        }
        .chest.opened i {
            color: #666;
        }
        .chest-number {
            font-size: 1.2rem;
            font-weight: 700;
            color: #9d4edd;
        }
        .chest.winner .chest-number {
            color: #000;
        }
        
        /* LOCK OVERLAY */
        .chest-lock {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: #ffd700;
            opacity: 0;
            transition: all 0.3s;
        }
        .chest:hover .chest-lock {
            opacity: 1;
        }
        .chest.opened .chest-lock,
        .chest.winner .chest-lock {
            display: none;
        }
        
        /* RESULT MESSAGE */
        .result-message {
            text-align: center;
            min-height: 80px;
            margin: 30px 0;
        }
        .result-message h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .result-message.win { color: #ffd700; }
        .result-message.empty { color: #ff6b6b; }
        
        /* NATIVE BANNER CONTAINER */
        .native-ad-container {
            max-width: 728px;
            margin: 20px auto;
            display: none;
        }
        .native-ad-container.active {
            display: block;
        }
        
        /* RETRY BUTTON */
        .retry-btn {
            display: none;
            margin: 20px auto;
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff6b6b, #ffaa00);
            border: none;
            color: #000;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 700;
            transition: all 0.3s;
        }
        .retry-btn.active {
            display: block;
        }
        .retry-btn:hover {
            transform: scale(1.05);
        }
        
        /* BOTÓN VOLVER */
        .back-btn {
            display: block;
            margin: 30px auto;
            padding: 15px 40px;
            background: transparent;
            border: 2px solid #9d4edd;
            color: #9d4edd;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: #9d4edd;
            color: #fff;
        }
        
        /* MODAL VICTORIA */
        .victory-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }
        .victory-modal.active {
            display: flex;
        }
        .victory-modal i {
            font-size: 6rem;
            color: #ffd700;
            margin-bottom: 20px;
            animation: victoryBounce 0.5s infinite;
        }
        @keyframes victoryBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .victory-modal h2 {
            font-size: 2.5rem;
            color: #ffd700;
            margin-bottom: 20px;
        }
        
        /* HINT */
        .hint {
            text-align: center;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            max-width: 500px;
            margin: 20px auto;
            font-size: 0.95rem;
        }
        .hint i {
            color: #ffd700;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <!-- POPUNDER -->
    <script src="https://chewsever.com/a5/85/ae/a585ae93afa1a1f4fb015a12a3854d44.js"></script>
    
    <!-- SOCIAL BAR -->
    <script src="https://pl29162395.profitablecpmratenetwork.com/b0/f0/a4/b0f0a465b1c66ee1c469e876f6871721.js"></script>
    
    <div class="header">
        <h1><i class="fas fa-box-open"></i> Cofres del Cine</h1>
        <p>Elige sabiamente. Solo un cofre contiene la clave de acceso.</p>
    </div>
    
    <div class="stats">
        <div class="stat-box">
            <span id="attemptsCount">0</span>
            <label>Intentos</label>
        </div>
        <div class="stat-box">
            <span id="chestsLeft">3</span>
            <label>Cofres restantes</label>
        </div>
    </div>
    
    <div class="hint">
        <i class="fas fa-lightbulb"></i> Pista: El cofre dorado brilla diferente...
    </div>
    
    <div class="chests-container" id="chestsContainer">
        <div class="chest" id="chest1" onclick="openChest(1)">
            <i class="fas fa-archive"></i>
            <span class="chest-number">#1</span>
            <i class="fas fa-lock chest-lock"></i>
        </div>
        <div class="chest" id="chest2" onclick="openChest(2)">
            <i class="fas fa-archive"></i>
            <span class="chest-number">#2</span>
            <i class="fas fa-lock chest-lock"></i>
        </div>
        <div class="chest" id="chest3" onclick="openChest(3)">
            <i class="fas fa-archive"></i>
            <span class="chest-number">#3</span>
            <i class="fas fa-lock chest-lock"></i>
        </div>
    </div>
    
    <div class="result-message" id="resultMessage"></div>
    
    <!-- NATIVE BANNER (se muestra cuando cofre vacío) -->
    <div class="native-ad-container" id="nativeAdContainer">
        <script async="async" data-cfasync="false" src="https://pl29162396.profitablecpmratenetwork.com/67e26d16354984487841c0badbdbb792/invoke.js"></script>
        <div id="container-67e26d16354984487841c0badbdbb792"></div>
    </div>
    
    <button class="retry-btn" id="retryBtn" onclick="retryMission()">
        <i class="fas fa-redo"></i> Intentar con nuevo cofre
    </button>
    
    <button class="back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left"></i> Volver al Portal
    </button>
    
    <!-- MODAL VICTORIA -->
    <div class="victory-modal" id="victoryModal">
        <i class="fas fa-gift"></i>
        <h2>¡COFRE DORADO!</h2>
        <p style="margin-bottom: 30px; font-size: 1.2rem;">Has encontrado la clave de acceso premium.</p>
        <button class="back-btn" onclick="claimVictory()" style="background: linear-gradient(135deg, #ffd700, #ffaa00); border: none; color: #000; font-weight: 700; font-size: 1.2rem;">
            <i class="fas fa-ticket-alt"></i> RECLAMAR TOKEN
        </button>
    </div>
    
    <script>
        let attempts = 0;
        let chestsOpened = 0;
        let winnerChest = Math.floor(Math.random() * 3) + 1; // 1, 2 o 3
        let gameOver = false;
        const SMARTLINK_URL = 'https://www.profitablecpmratenetwork.com/fd92nnjkv?key=6932873a546891664b4dce617e72621d';
        
        function openChest(num) {
            if (gameOver) return;
            
            const chest = document.getElementById(`chest${num}`);
            if (chest.classList.contains('opened') || chest.classList.contains('winner')) return;
            
            attempts++;
            chestsOpened++;
            document.getElementById('attemptsCount').textContent = attempts;
            document.getElementById('chestsLeft').textContent = 3 - chestsOpened;
            
            // Abrir smartlink
            window.open(SMARTLINK_URL, '_blank');
            
            if (num === winnerChest) {
                // ¡GANADOR!
                chest.classList.add('winner');
                chest.innerHTML = '<i class="fas fa-gift"></i><span class="chest-number">¡GANADOR!</span>';
                gameOver = true;
                
                document.getElementById('resultMessage').innerHTML = `
                    <h2 class="win"><i class="fas fa-star"></i> ¡COFRE DORADO!</h2>
                    <p>Has encontrado el tesoro escondido.</p>
                `;
                
                setTimeout(() => {
                    document.getElementById('victoryModal').classList.add('active');
                }, 1000);
                
            } else {
                // COFRE VACÍO
                chest.classList.add('opened');
                chest.innerHTML = '<i class="fas fa-box-open"></i><span class="chest-number">Vacío</span>';
                
                document.getElementById('resultMessage').innerHTML = `
                    <h2 class="empty"><i class="fas fa-times-circle"></i> Cofre vacío</h2>
                    <p>Este cofre solo contiene polvo... Sigue buscando.</p>
                `;
                
                // Mostrar native banner
                document.getElementById('nativeAdContainer').classList.add('active');
                
                // Mostrar botón de reintento si quedan cofres
                if (chestsOpened < 3) {
                    document.getElementById('retryBtn').classList.add('active');
                }
            }
        }
        
        function retryMission() {
            // Abrir smartlink al reintentar
            window.open(SMARTLINK_URL, '_blank');
            
            // Ocultar native banner
            document.getElementById('nativeAdContainer').classList.remove('active');
            document.getElementById('retryBtn').classList.remove('active');
            document.getElementById('resultMessage').innerHTML = '';
        }
        
        function claimVictory() {
            console.log('[COFRES] Completando misión 5...');
            
            // Abrir smartlink final
            window.open(SMARTLINK_URL, '_blank');
            
            // Guardar datos de misión completada
            const missionData = {
                number: 5,
                completed: true,
                completedAt: Date.now()
            };
            localStorage.setItem('tk-current-mission', JSON.stringify(missionData));
            localStorage.setItem('tk-mission-complete', 'true');
            
            console.log('[COFRES] Misión guardada:', missionData);
            
            // Redirigir al portal
            window.location.href = '../index.html?mission=completed';
        }
        
        function goBack() {
            window.location.href = '../index.html';
        }
        
        // Pista visual: El cofre ganador tiene un brillo dorado sutil
        document.addEventListener('DOMContentLoaded', () => {
            const winner = document.getElementById(`chest${winnerChest}`);
            winner.style.boxShadow = '0 10px 30px rgba(255, 215, 0, 0.3)';
        });
    </script>
</body>
</html>
