    <link rel="stylesheet" href="../styles/style-index.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Mejora para el menú de géneros en móviles */
        .nav-scroll {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            gap: 8px;
            padding-bottom: 10px;
            scrollbar-width: none;
            /* Firefox */
        }

        .nav-scroll::-webkit-scrollbar {
            display: none;
            /* Chrome/Safari */
        }
    </style>

                    <a href="../index.html" class="group flex items-center">
                        <div class="nova-card p-2 px-4 flex items-center relative overflow-hidden logo-container">

                                class="fas fa-film mr-3 text-nova-accent text-xl group-hover:rotate-12 transition-transform duration-300"></i>

                    <a href="?v=misterio" class="nova-card px-3 py-2 text-sm text-nova-text">Misterio</a>

                    <a href="?v=comedia" class="nova-card px-3 py-2 text-sm text-nova-text">Comedia</a>

        <div class="search-header-bar p-4">
            <div class="max-w-4xl mx-auto">
                <div class="search-wrapper">
                    <i class="fas fa-search lupa-icon"></i>
                    <input id="navSearchInput" type="text" placeholder="Buscar en esta sección..."
                        class="search-input-premium">
                    <button class="clear-btn"><i class="fas fa-times-circle"></i></button>
                    <div class="input-glow"></div>
                </div>
            </div>
        </div>

            <h1 id="page-title" class="flex items-center justify-center gap-3 text-3xl text-nova-text capitalize">

                    de <span id="total-pages-num" class="text-gradient font-bold">...</span>

        </div>

        <footer class="pagination-footer">
            <div class="pagination-wrapper">
                <div id="pagination-controls" class="pagination-controls">
                </div>
            </div>
        </footer>

    <script src="../config.js"></script>
