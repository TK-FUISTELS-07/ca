<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TK-OCEAN</title>
  <!-- SECURITY: Validación de token obligatoria -->
  <script src="../security.js"></script>
  <link rel="stylesheet" href="../styles/style-index.css">
  <link rel="stylesheet" href="../styles/style-peliculas.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
  <header class="main-header sticky top-0 z-[100] w-full">
    <nav id="navbar" class="relative w-full border-b border-white/10">
      <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="flex-shrink-0">
          <a href="../index.html" class="group flex items-center">
            <div class="nova-card p-2 px-4 flex items-center relative overflow-hidden logo-container">
              <div
                class="absolute inset-0 bg-nova-accent/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
              </div>

              <i
                class="fas fa-film mr-3 text-nova-accent text-xl group-hover:rotate-12 transition-transform duration-300"></i>

              <span class="text-2xl font-black tracking-tighter logo-text">
                TK-<span class="text-nova-accent">OCEAN</span>
              </span>

              <div
                class="absolute bottom-0 left-0 h-[2px] w-0 bg-nova-accent group-hover:w-full transition-all duration-500">
              </div>
            </div>
          </a>
        </div>

        <div class="hidden md:flex items-center space-x-2">
          <a href="../index.html" class="nova-card px-3 py-2 text-sm text-nova-text">Inicio</a>
          <a href="../series/?view=todas" id="link-todas"
            class="nova-card px-3 py-2 text-sm text-nova-text">Series</a>
          <a href="../series/?view=populares" id="link-todas"
            class="nova-card px-3 py-2 text-sm text-nova-text">Populares</a>
        </div>
      </div>
    </nav>

    <div class="search-header-bar p-4">
      <div class="max-w-4xl mx-auto">
        <div class="search-wrapper">
          <i class="fas fa-search lupa-icon"></i>
          <input id="navSearchInput" type="text" placeholder="Buscar títulos..." class="search-input-premium">
          <button class="clear-btn"><i class="fas fa-times-circle"></i></button>
          <div class="input-glow"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="p-4">
    <div class="section-header mb-12 text-center">
      <h1 id="page-title" class="flex items-center justify-center gap-3 text-3xl text-nova-text">
        <i class="fas fa-film"></i> Películas
      </h1>
      <div id="pagination-status-container" class="nova-card p-4 mt-6 inline-block">
        <p class="text-nova-text-secondary">
          Página <span id="current-page-num" class="text-gradient font-bold">...</span>
          de <span id="total-pages-num" class="text-gradient font-bold">...</span>
        </p>
      </div>
    </div>

    <section id="catalog-grid" class="grid-container"></section>

    <footer class="pagination-footer">
      <div class="pagination-wrapper">
        <div id="pagination-controls" class="pagination-controls">
        </div>
      </div>
    </footer>
  </main>

  <script src="../config.js"></script>
  <script type="module" src="../src/pages/series.js"></script>
  <script type="module" src="../src/ui/sidebar.js"></script>
</body>

</html>
