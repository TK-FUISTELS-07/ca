<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reproductor - TK-OCEAN</title>
  <!-- SECURITY: Validación de token obligatoria -->
  <script src="../../security.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
      }

      :root {
            --green-primary: #00d4ff;
            --green-secondary: #7b2cbf;
            --bg-dark: #0a0a0a;
            --bg-card: #141414;
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Ambient Light Effect */
        .ambient-light {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(0,212,255,0.15) 0%, transparent 60%);
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
        }

        /* Header Estilo Disney+ */
        .disney-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
            transition: all 0.4s ease;
        }

        .disney-header.hidden {
            transform: translateY(-100%);
            opacity: 0;
        }

        /* Botón Volver */
        .btn-back {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-back:hover {
            background: var(--green-primary);
            border-color: var(--green-primary);
            color: #000;
        }

        /* Info de Episodio */
        .header-episode-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            margin: 0 1rem;
        }

        .header-serie-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 50vw;
        }

        .header-episode-subtitle {
            font-size: 0.85rem;
            color: var(--green-primary);
            font-weight: 500;
            margin-top: 0.25rem;
        }

        /* Botón Volver */
        .btn-back {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .btn-back:hover {
            background: var(--green-primary);
            border-color: var(--green-primary);
            color: #000;
        }

        /* Controles de Navegación de Episodios */
        .episode-nav {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-episode-nav {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .btn-episode-nav:hover:not(:disabled) {
            background: var(--green-primary);
            border-color: var(--green-primary);
            color: #000;
        }

        .btn-episode-nav:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-episode-nav i {
            font-size: 0.8rem;
        }

        /* Contenedor del Reproductor */
        .player-container {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }

        #video-frame {
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* Overlay transparente para capturar eventos del mouse */
        .mouse-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 999;
            pointer-events: none;
        }

        /* Áreas activas para mostrar header */
        .mouse-overlay .hotspot-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 150px;
            pointer-events: auto;
        }

        .mouse-overlay:hover + .disney-header,
        .disney-header:hover {
            transform: translateY(0) !important;
            opacity: 1 !important;
        }

        /* Loader */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.3s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0,212,255,0.2);
            border-top-color: var(--green-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-overlay p {
            margin-top: 1.5rem;
            color: var(--green-primary);
            font-size: 1rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Pantalla de Error */
        .error-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            text-align: center;
            padding: 2rem;
        }

        .error-screen.active {
            display: flex;
        }

        .error-icon {
            font-size: 4rem;
            color: #ff4444;
            margin-bottom: 1.5rem;
        }

        .error-screen h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .error-screen p {
            color: #a3a3a3;
            margin-bottom: 2rem;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-control {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-control:hover {
            background: var(--green-primary);
            border-color: var(--green-primary);
            color: #000;
        }

        /* Debug Panel */
        .debug-panel {
            display: none !important;
            position: fixed;
            top: 50%;
            left: 50%;
            width: 400px;
            max-height: 70vh;
            background: rgba(10,10,15,0.95);
            border: 1px solid rgba(0,212,255,0.3);
            border-radius: 12px;
            padding: 15px;
            z-index: 9999;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        /* .debug-panel.active { display: block; } */
        .debug-panel h4 {
            color: #00d4ff;
            margin: 0 0 10px 0;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .debug-panel pre {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 6px;
            color: #7ee787;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .btn-debug {
            display: none !important;
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9998;
            background: rgba(0,212,255,0.2);
            border: 1px solid rgba(0,212,255,0.4);
            color: #00d4ff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
        }
        .btn-debug:hover {
            background: rgba(0,212,255,0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .disney-header {
                padding: 0.75rem 1rem;
            }

            .header-serie-title {
                font-size: 0.9rem;
                max-width: 40vw;
            }

            .btn-episode-nav span {
                display: none;
            }

            .btn-episode-nav {
                padding: 0.5rem;
            }

            .btn-back span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="ambient-light"></div>

    <!-- Overlay para detectar movimiento del mouse sobre iframe -->
    <div class="mouse-overlay" id="mouseOverlay">
        <div class="hotspot-top"></div>
    </div>

    <!-- Header con título y navegación de episodios -->
    <header class="disney-header" id="header">
        <button class="btn-back" onclick="goBack()" title="Volver al detalle">
            <i class="fas fa-arrow-left"></i>
            <span>Volver</span>
        </button>

        <div class="header-episode-info">
            <span class="header-serie-title" id="serie-title">Cargando...</span>
            <span class="header-episode-subtitle" id="episode-info"></span>
        </div>

        <div class="episode-nav">
            <button id="btn-prev-episode" onclick="goToPrevEpisode()" class="btn-episode-nav" disabled>
                <i class="fas fa-step-backward"></i>
                <span>Anterior</span>
            </button>
            <button id="btn-next-episode" onclick="goToNextEpisode()" class="btn-episode-nav" disabled>
                <span>Siguiente</span>
                <i class="fas fa-step-forward"></i>
            </button>
        </div>
    </header>

    <!-- Botón Debug -->
    <button class="btn-debug" onclick="toggleDebugPanel()" title="Ver JSON">Ver JSON</button>

    <!-- Panel Debug -->
    <div class="debug-panel" id="debugPanel">
        <h4>Datos Player <button onclick="toggleDebugPanel()" style="background:none;border:none;color:#fff;cursor:pointer;">×</button></h4>
        <pre id="debugContent">Cargando...</pre>
    </div>

    <!-- Contenedor del reproductor -->
    <div class="player-container">
        <!-- Loading -->
        <div class="loading-overlay" id="loader">
            <div class="spinner"></div>
            <p>Cargando reproductor...</p>
        </div>

        <!-- Pantalla de error -->
        <div class="error-screen" id="error">
            <i class="fas fa-exclamation-triangle error-icon"></i>
            <h2>Error al cargar el video</h2>
            <p>Esta fuente no está disponible. Intenta con otra.</p>
            <div class="error-actions">
                <button class="btn-control" onclick="retryCurrent()">
                    <i class="fas fa-redo"></i> Reintentar
                </button>
                <button class="btn-control" onclick="nextSource()">
                    <i class="fas fa-forward"></i> Siguiente fuente
                </button>
            </div>
        </div>

        <!-- Iframe del video -->
        <iframe id="video-frame" allowfullscreen scrolling="no" allow="autoplay; fullscreen; picture-in-picture"></iframe>
    </div>

    <script src="./../../config.js"></script>
    <script src="./player.js"></script>
</body>
</html>
